spring.application.name=Pbar

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/productivity_tracker}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:true}

jwt.secret=${JWT_SECRET:MySuperSecretKeyForProductivityTrackerApplication123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}